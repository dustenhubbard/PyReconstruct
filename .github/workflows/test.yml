name: tests

# Runs the pytest suite so PRs gate on a green suite. Fires on every PR targeting
# main and on pushes to main itself (the post-merge validation). The tests import
# PySide6 (gui.main), so the job installs the headless Qt system libs and runs
# under the offscreen QPA platform — no X server / xvfb needed.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One in-flight run per ref; a newer push to the same PR/branch supersedes the old.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only checks out and builds; it touches no secrets.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # headroom for the cold wheel install (vtk/scipy/...); the suite itself is ~seconds
    steps:
      - uses: actions/checkout@v4   # shallow is fine: no test reads the setuptools-scm version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"    # requires-python is >=3.11,<3.12
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install headless Qt system libs
        # PySide6 6.5 needs these even under the offscreen platform. libglib2.0-0t64,
        # libX11, libfreetype6 and zlib are already present on the ubuntu-latest image.
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          for i in 1 2 3; do sudo apt-get update && break || sleep 5; done
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libfontconfig1 libdbus-1-3

      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run test suite (headless / offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -ra   # -ra surfaces xfail/xpass/skip reasons if the gate goes red
