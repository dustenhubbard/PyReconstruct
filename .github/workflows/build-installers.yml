name: build-installers

# Builds unsigned one-click installers and publishes them to THIS repo's GitHub
# Releases: a tag vX.Y.Z -> Release; a push to main -> rolling 'prerelease'
# build. The in-app updater (updater.GITHUB_REPO) reads these. Runs on the
# fork as-is (no hardcoded owner). Signing is deferred (proof of concept).

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write   # create / update GitHub Releases

# --- Concurrency design (rolling-release race) -------------------------------
# Two rapid pushes to main used to run fully concurrent workflows that each
# delete+recreate the rolling 'prerelease' release. If the OLDER commit's job
# finished last, the Developer channel served the older build (and the .devN
# freshness number then read as a downgrade, stranding users until the next
# push). The fix is split deliberately across two phases, NOT a single
# workflow-level `cancel-in-progress`:
#
#   * BUILD phase (jobs.build): ref-scoped group + cancel-in-progress:true.
#     A newer push to main cancels the older main BUILD before it can publish,
#     so the superseded run's release-prerelease is skipped (its `needs: build`
#     result becomes `cancelled`, failing the success/failure gate below) and
#     never touches the release -> the newest main build wins, and CI isn't
#     wasted. Because the group keys on ${{ github.ref }}, every tag is its own
#     lane: tag builds never cancel each other and are never cancelled by a
#     main push (requirement: tag releases must never be cancelled).
#
#   * PUBLISH phase (jobs.release-prerelease): a NON-ref-scoped group with
#     cancel-in-progress:FALSE. The delete+recreate of the 'prerelease' release
#     is two steps, NOT atomic; a cancellation landing between them would leave
#     the channel deleted-but-not-recreated (no release at all -- the one state
#     we must never reach). cancel-in-progress:false ensures a publish that has
#     started is never CANCELLED between the two steps, so concurrency can no
#     longer strand the channel (delete is always followed by its recreate).
#     (A hard FAILURE of the recreate step could still strand it -- a
#     pre-existing property of delete-then-recreate, out of scope here and not
#     something concurrency can fix.) Newest-wins still holds: a
#     running publish finishes, and among *pending* publishes GitHub keeps only
#     the newest (older pending ones are dropped), so the last write is the
#     newest build. softprops/action-gh-release@v2 updates the existing
#     'prerelease' release (creating it if absent), so each recreate yields a
#     complete release. Only main pushes enter this job (see its `if:`), so
#     tag publishes never queue behind it.
# -----------------------------------------------------------------------------

jobs:
  build:
    concurrency:
      # Cancel a superseded in-flight build; ref-scoped so tags keep separate
      # lanes. The group MUST also include the matrix leg: job-level concurrency
      # applies per job instance, so without the matrix key all three legs of
      # ONE run share a group and cancel each other (this broke every build
      # after it was first introduced ref-only -- two legs cancelled, release
      # skipped). Per-leg groups keep the intended behavior: a newer main push
      # cancels the older run's same-platform leg only.
      group: build-installers-build-${{ github.ref }}-${{ matrix.plat }}-${{ matrix.arch }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, plat: Windows, arch: x86_64 }
          # Two native single-arch macOS builds rather than one universal2 build:
          # the native dependency stack (vtk 9.4.2, scipy, scikit-image, opencv,
          # the cloud-volume codecs) ships per-arch wheels, not universal2, so a
          # universal2 freeze would force source builds and likely fail. Each arch
          # is built on its own native runner, where PyInstaller freezes for the
          # arch of the runner's Python.
          #   macos-14 = Apple Silicon (arm64); macos-15-intel = Intel (x86_64).
          # GitHub retired the macos-13 Intel image in Dec 2025; macos-15-intel is
          # the current Intel label, available until macOS 15 retires (~Fall 2027),
          # after which GitHub drops x86_64 macOS runners entirely. The Intel dmg is
          # purely additive: if that leg is unavailable or fails, fail-fast:false
          # plus the release jobs' failure-tolerant gate still ship the arm64 and
          # Windows installers.
          - { os: macos-14,       plat: macOS,   arch: arm64 }
          - { os: macos-15-intel, plat: macOS,   arch: x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # setuptools-scm needs full history + tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project, build tools, PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools-scm "pyinstaller>=6,<7"
          python -m pip install -e .

      - name: Compute version
        shell: bash
        run: |
          V="$(python -m setuptools_scm)"
          case "$V" in
            0.0.0*|*unknown*)
              echo "::error::setuptools-scm produced a fallback version ($V) — missing tags or fetch-depth:0?"
              exit 1 ;;
          esac
          echo "PYR_VERSION=$V" >> "$GITHUB_ENV"
          echo "PYR_PUBLIC=${V%%+*}" >> "$GITHUB_ENV"

      - name: Smoke test (imports; offscreen render skipped on headless CI)
        env:
          QT_QPA_PLATFORM: offscreen
          PYRECON_SMOKE_SKIP_RENDER: "1"
        run: python packaging/smoke_test.py

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: bash packaging/macos/make_icns.sh

      - name: PyInstaller freeze
        run: pyinstaller --noconfirm packaging/PyReconstruct.spec

      - name: Frozen self-test (Windows) — catches windowed-only import bugs
        if: runner.os == 'Windows'
        run: |
          $p = Start-Process -FilePath "dist\PyReconstruct\PyReconstruct.exe" -ArgumentList "--selftest" -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "frozen self-test failed (exit $($p.ExitCode))"; exit 1 }
          Write-Host "frozen self-test OK"

      - name: Frozen self-test (macOS) — catches windowed-only import bugs
        if: runner.os == 'macOS'
        run: |
          dist/PyReconstruct.app/Contents/MacOS/PyReconstruct --selftest
          echo "frozen self-test OK"

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DPYR_VERSION=$env:PYR_PUBLIC" "packaging\windows\PyReconstruct.iss"
          New-Item -ItemType Directory -Force -Path dist-assets | Out-Null
          Move-Item "packaging\windows\Output\*.exe" dist-assets\

      - name: Build macOS dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-assets
          ARCH="${{ matrix.arch }}" bash packaging/macos/make_dmg.sh
          mv PyReconstruct-*.dmg dist-assets/

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.plat }}-${{ matrix.arch }}
          path: dist-assets/*
          if-no-files-found: error

  release:
    needs: build
    # publish whatever built, even if one matrix leg failed (don't hide a good installer)
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') && (needs.build.result == 'success' || needs.build.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4          # needed for packaging/linux/ + release notes
        with:
          fetch-depth: 0                   # full history + tags for the changelog link
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Package the Linux .sh installer
        # The Linux installer is a script bundle (no frozen binary), so it has no
        # build-matrix leg — assemble it here and ship it as a release asset.
        run: |
          # Name the asset with the PEP 440 public version (what setuptools-scm
          # bakes in, and what the frozen mac/Windows assets use) rather than the
          # raw tag, so a v1.21.0-beta-1 tag yields 1.21.0b1 like the others. The
          # install-source pin below still uses the exact tag ref.
          python3 -m pip install --quiet --disable-pip-version-check packaging
          VERSION="$(python3 -c "from packaging.version import Version; print(Version('${GITHUB_REF_NAME#v}'))")"
          STAGE="PyReconstruct-linux-installer"
          mkdir -p "$STAGE"
          cp packaging/linux/install.sh packaging/linux/uninstall.sh \
             packaging/linux/pyreconstruct.desktop.in packaging/linux/README.md "$STAGE"/
          # Standalone installs pin to this exact tag, so a vX.Y.Z asset installs
          # vX.Y.Z (not bleeding main).
          sed -i "s#DEFAULT_SOURCE=\"git+https://github.com/dustenhubbard/PyReconstruct.git\"#DEFAULT_SOURCE=\"git+https://github.com/dustenhubbard/PyReconstruct.git@${GITHUB_REF_NAME}\"#" "$STAGE/install.sh"
          # sed exits 0 even when the pattern matched nothing; if the
          # DEFAULT_SOURCE line in install.sh ever drifts, an unverified sed
          # would silently ship an installer that installs bleeding main
          # instead of this tag. Fail the release loudly instead.
          grep -qF "PyReconstruct.git@${GITHUB_REF_NAME}\"" "$STAGE/install.sh" || {
            echo "::error::Linux installer version pin did not apply — DEFAULT_SOURCE line in packaging/linux/install.sh no longer matches the sed pattern above"
            exit 1
          }
          tar -czf "dist/PyReconstruct-${VERSION}-Linux-installer.tar.gz" "$STAGE"
      - name: Generate checksums
        run: cd dist && for f in *; do [ -f "$f" ] && sha256sum "$f" > "$f.sha256"; done
      - name: Build friendly release notes
        # User-facing highlights from WHATS_NEW.md + a single link to the technical
        # changelog -- deliberately NOT GitHub's auto-generated "What's Changed" list,
        # which reads as developer jargon to general users.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## What's new in ${VERSION}"
            awk -v ver="$VERSION" '
              /^##[ \t]+\[/ { t=$0; sub(/^##[ \t]+\[/,"",t); sub(/\].*/,"",t); sub(/^[vV]/,"",t); cap=(t==ver); next }
              cap { print }
            ' WHATS_NEW.md
            echo ""
            echo "---"
            PREV=$(git tag --sort=-version:refname | awk -v c="$GITHUB_REF_NAME" 'found{print; exit} $0==c{found=1}')
            if [ -n "$PREV" ]; then
              echo "_For developers — the full technical changelog:_ **[compare ${PREV} → ${GITHUB_REF_NAME}](https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${GITHUB_REF_NAME})**"
            else
              echo "_For developers — the full technical changelog:_ **[commit history](https://github.com/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME})**"
            fi
          } > release_body.md
          echo "----- release_body.md -----"; cat release_body.md
      - name: Classify release
        # Only a clean vX.Y.Z tag is a stable release; anything else -- a
        # PEP 440-normalized pre-release (v1.20.4rc1), a dashed one (v1.20.4-rc.1),
        # or an alpha (v1.30.0a1) -- publishes as a GitHub pre-release. A plain
        # contains('-') check misclassifies the dashless v1.20.4rc1 as stable.
        id: rel
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: ${{ steps.rel.outputs.prerelease }}
          # Stage a release as a hidden DRAFT (e.g. for a live demo): set the repo
          # variable STAGE_RELEASE_AS_DRAFT=true, push the tag, then hit "Publish"
          # when ready — assets are pre-built so it goes live instantly. The updater
          # ignores drafts, so it stays invisible until published. Unset/false (the
          # default) publishes immediately, exactly as before.
          draft: ${{ vars.STAGE_RELEASE_AS_DRAFT == 'true' }}
          body_path: release_body.md
      - name: Prune superseded pre-releases
        # A published stable vX.Y.Z supersedes its own pre-releases (v1.21.0rc1,
        # v1.21.0-rc.1, v1.21.0a1, ...): delete their GitHub Releases and git
        # tags so the Releases page and the in-app updater only offer the
        # stable. scripts/prune_prereleases.py scopes the selection to the
        # exact X.Y.Z line -- the stable itself and every other version line
        # are never touched. Skipped when staging as a draft: the stable is
        # still hidden then, and pruning would leave the line with no visible
        # release (clean up by hand after publishing a staged draft).
        if: steps.rel.outputs.prerelease == 'false' && vars.STAGE_RELEASE_AS_DRAFT != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail   # a helper/list failure should flag loudly, not silently skip the prune
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName --jq '.[].tagName' \
            | python3 scripts/prune_prereleases.py "$GITHUB_REF_NAME" \
            | while read -r t; do
                echo "pruning superseded pre-release: $t"
                gh release delete "$t" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
              done

  release-prerelease:
    needs: build
    concurrency:
      # Serialize rolling-release publishes and NEVER cancel one mid-flight: the
      # delete+recreate below is not atomic, so cancellation between the steps
      # would strand the Developer channel with no release. See the design note
      # above the jobs block. Group is intentionally NOT ref-scoped (all main
      # publishes share one lane) and cancel-in-progress is false.
      group: build-installers-rolling-release
      cancel-in-progress: false
    # RE-ENABLED 2026-07-17: this rolling "latest main" build now feeds the in-app
    # **Developer** update channel (updater selects it by the fixed `prerelease` tag;
    # the Beta channel explicitly excludes that tag, so it can no longer confuse the
    # curated pre-release stream — the 2026-06-29 pause reason). The `release` job's
    # "Classify release" step already marks pre-release tags correctly, satisfying the
    # pause note's precondition. See pyrecon-notes/DECISIONS.md.
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' && (needs.build.result == 'success' || needs.build.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: cd dist && for f in *; do [ -f "$f" ] && sha256sum "$f" > "$f.sha256"; done
      - name: Reset the rolling 'prerelease' build (drop stale assets)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete prerelease --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          # belt-and-suspenders: if the release survived a failed delete, purge its assets
          if gh release view prerelease --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release view prerelease --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' \
              | xargs -r -I{} gh release delete-asset prerelease {} --yes --repo "$GITHUB_REPOSITORY"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          # The reused 'prerelease' tag backs the in-app updater's DEVELOPER
          # channel (the rolling latest-main build), NOT the Beta channel: Beta
          # (updater channel 'prerelease') serves curated semver pre-releases and
          # explicitly excludes this tag. Keep the tag name 'prerelease' -- the
          # updater's pick_release selects the rolling build by that exact tag
          # (updater.ROLLING_TAG). Only the human-facing release title says
          # "Developer".
          tag_name: prerelease
          name: "Developer (latest main, expect breakage)"
          prerelease: true
          target_commitish: main
          files: dist/*
