name: publish-pypi

# DISABLED ON THIS FORK — releases are GitHub-installer-only for now.
#
# This workflow was inherited from upstream, where it published the sdist +
# wheel to the PyPI 'pyreconstruct' project on a vX.Y.Z tag via OIDC Trusted
# Publishing. The job was guarded to 'SynapseWeb/PyReconstruct', which made it
# a permanent silent no-op on this fork: every tag "ran" the workflow, skipped
# the only job, and shipped no wheel — while looking green.
#
# Until a fork-owned PyPI project + Trusted Publisher exists, tag releases on
# this fork ship installers only (see build-installers.yml). To re-enable
# automatic publishing:
#   1. Register a PyPI project owned by this fork and configure a Trusted
#      Publisher for it: repository dustenhubbard/PyReconstruct, workflow
#      publish-pypi.yml, environment 'pypi'.
#   2. Restore the tag trigger:  on: { push: { tags: ["v*.*.*"] } }
# The repository guard below now matches THIS fork, so a manual dispatch can
# be used to test the pipeline once step 1 is done; it still refuses to run
# from anyone else's fork of this fork.

on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC trusted publishing

jobs:
  pypi:
    if: github.repository == 'dustenhubbard/PyReconstruct'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # setuptools-scm needs full history + tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
